<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Serviços MediQuo</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Reusa o CSS principal + estilos admin inline -->
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ─── Admin-specific overrides ─────────────────────── */

    .admin-container {
      max-width: 780px;
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: var(--shadow-glow);
      max-width: 400px;
      margin: 4rem auto;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.6rem;
    }

    .login-sub {
      font-size: 0.88rem;
      color: var(--color-text-muted);
      margin-bottom: 1.5rem;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 1.4rem;
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-soft));
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .btn-google:hover { opacity: 0.88; }

    .admin-panel { display: none; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .admin-user {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .btn-logout {
      padding: 0.4rem 0.9rem;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-danger);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-logout:hover { border-color: var(--color-danger); }

    /* Tabs */
    .admin-tabs {
      display: flex;
      gap: 0;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 3px;
      margin-bottom: 1.5rem;
    }

    .admin-tab {
      flex: 1;
      padding: 0.55rem 1rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .admin-tab:hover:not(.active) { color: var(--color-text); }

    .admin-tab.active {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-soft));
      color: #fff;
      box-shadow: 0 2px 8px rgba(var(--color-primary-rgb), 0.3);
    }

    /* Edit table */
    .edit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .edit-table th,
    .edit-table td {
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--color-border);
      vertical-align: top;
    }

    .edit-table th {
      background: var(--table-header-bg);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }

    .edit-cell {
      width: 100%;
      min-height: 2rem;
      padding: 0.35rem 0.5rem;
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--color-text);
      background: var(--color-input-bg);
      border: 1px solid transparent;
      border-radius: 4px;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s;
    }

    .edit-cell:focus {
      border-color: var(--color-accent);
    }

    .edit-cell.dirty {
      border-color: var(--color-warning);
    }

    /* FAQ edit */
    .faq-edit-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .faq-edit-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
    }

    .faq-edit-field {
      margin-bottom: 0.75rem;
    }

    .faq-edit-label {
      display: block;
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .faq-edit-input,
    .faq-edit-textarea {
      width: 100%;
      padding: 0.5rem 0.7rem;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--color-text);
      background: var(--color-input-bg);
      border: 1.5px solid var(--color-input-border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s;
    }

    .faq-edit-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .faq-edit-input:focus,
    .faq-edit-textarea:focus {
      border-color: var(--color-accent);
    }

    .faq-edit-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .btn-sm {
      padding: 0.4rem 0.85rem;
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-sm:hover { opacity: 0.85; }

    .btn-save {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-soft));
      color: #fff;
    }

    .btn-delete {
      background: var(--color-surface-2);
      color: var(--color-danger);
      border: 1px solid var(--color-border);
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-soft));
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.2s;
    }

    .btn-add:hover { opacity: 0.88; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 0.65rem 1.4rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      border-radius: var(--radius-sm);
      z-index: 200;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast-success { background: #059669; }
    .toast-error { background: var(--color-danger); }

    /* Responsive */
    @media (max-width: 768px) {
      .login-card { margin: 2rem 1rem; padding: 2rem 1.25rem; }
      .admin-header { flex-direction: column; align-items: flex-start; }
      .edit-table { font-size: 0.75rem; }
    }
  </style>
</head>

<body>
  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
    <svg class="theme-icon" id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
    </svg>
  </button>

  <div class="container admin-container">

    <!-- Login -->
    <div class="login-card" id="loginSection">
      <h1 class="login-title">Painel Administrativo</h1>
      <p class="login-sub">Faça login com sua conta Google autorizada para editar o conteúdo do site.</p>
      <div id="googleLoginBtn"></div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
      <div class="admin-header">
        <div>
          <h1 class="header-title" style="font-size:1.4rem;">Painel Admin</h1>
          <span class="admin-user" id="adminUser"></span>
        </div>
        <button class="btn-logout" id="logoutBtn">Sair</button>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="tabela">Tabela de Serviços</button>
        <button class="admin-tab" data-tab="faq">FAQ</button>
      </div>

      <!-- Tab: Tabela -->
      <div class="tab-content" id="tabTabela">
        <div class="loading-state" id="adminTabelaLoading">
          <div class="loading-spinner"></div>
          <p class="loading-text">Carregando tabela…</p>
        </div>
        <div class="table-wrapper" id="adminTabelaContent" style="display:none;">
          <table class="edit-table" id="editTable">
            <thead id="editTableHead"></thead>
            <tbody id="editTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Tab: FAQ -->
      <div class="tab-content" id="tabFaq" style="display:none;">
        <div class="loading-state" id="adminFaqLoading">
          <div class="loading-spinner"></div>
          <p class="loading-text">Carregando FAQ…</p>
        </div>
        <div id="adminFaqContent" style="display:none;">
          <div class="faq-edit-list" id="faqEditList"></div>
          <button class="btn-add" id="addFaqBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Adicionar Pergunta
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- App -->
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
