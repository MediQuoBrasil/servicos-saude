<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Serviços de saúde MediQuo — informações sobre consultas, horários, modalidades e FAQ.">
  <title>Serviços de Saúde — MediQuo</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <!-- Toggle Tema -->
  <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema claro/escuro">
    <svg class="theme-icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-glow"></div>
      <h1 class="header-title">Serviços de Saúde</h1>
      <p class="header-sub">Informações sobre consultas, horários e modalidades — MediQuo</p>
    </header>

    <!-- Tabela de Serviços -->
    <section class="section" id="tabelaSection">
      <h2 class="section-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        Quadro de Serviços
      </h2>

      <!-- Loading -->
      <div class="loading-state" id="tabelaLoading">
        <div class="loading-spinner"></div>
        <p class="loading-text">Carregando informações…</p>
      </div>

      <!-- Error -->
      <div class="error-state" id="tabelaError" style="display:none;">
        <p class="error-msg" id="tabelaErrorMsg">Não foi possível carregar os dados.</p>
        <button class="btn-retry" id="tabelaRetry">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Tentar novamente
        </button>
      </div>

      <!-- Conteúdo -->
      <div id="tabelaContent" style="display:none;">
        <div class="table-wrapper">
          <table class="service-table" id="serviceTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="scroll-hint" id="scrollHint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          Deslize para ver mais colunas
        </div>
      </div>
    </section>

    <!-- FAQ -->
    <section class="section" id="faqSection">
      <h2 class="section-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Perguntas Frequentes
      </h2>

      <!-- Loading -->
      <div class="loading-state" id="faqLoading">
        <div class="loading-spinner"></div>
        <p class="loading-text">Carregando FAQ…</p>
      </div>

      <!-- Error -->
      <div class="error-state" id="faqError" style="display:none;">
        <p class="error-msg" id="faqErrorMsg">Não foi possível carregar o FAQ.</p>
        <button class="btn-retry" id="faqRetry">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Tentar novamente
        </button>
      </div>

      <!-- Conteúdo -->
      <div class="faq-list" id="faqList" style="display:none;"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      MediQuo — Serviços de Saúde
    </footer>
  </div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }
  </script>

  <!-- App -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
